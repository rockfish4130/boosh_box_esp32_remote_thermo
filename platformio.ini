[env:esp32-oled]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = COM12
build_flags =
  -I .
  -D STATUS_LED_PIN=-1
  -D THERMISTOR_PIN1=36
  -D THERMISTOR_PIN2=39

; Target board assumptions:
; - ESP32-WROOM/ESP32-D0WD class module with 4 MB flash
; - Built-in 0.96" SSD1306 OLED at I2C address 0x3C
; - OLED wired SDA=GPIO21, SCL=GPIO22 per the AliExpress listing image
; - Thermistors wired to VP/GPIO36 and VN/GPIO39, matching the original ADC1 usage
